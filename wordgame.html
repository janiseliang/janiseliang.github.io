<html>
<head>
	<meta charset="utf-8">
	<title>a word game</title>
	<meta content="width=device-width, initial-scale=1" name="viewport">
	<link href="assets/css/style.css" rel="stylesheet" type="text/css">

	<script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js" type="text/javascript"></script>

	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Varela+Round:400%7CRoboto:100italic,300,300italic,regular,italic,500,500italic,700,700italic,900,900italic&amp;subset=vietnamese,cyrillic-ext,greek-ext,greek,latin-ext,latin,cyrillic" media="all">

	<link href="assets/images/donut.png" rel="shortcut icon" type="image/x-icon">
    <script type="text/javascript" src="assets/scripts/wordgame.js"></script>
</head>
<body>
	<div style="margin:20px">
	<script>word=getWord();</script>
  	<input type="button" onclick="word=reset();" value="restart game"/>
	<input type="button" value="give up :(" onclick="surrender(word)"></input>

	<form onsubmit="makeGuess(word); return false;">
		<input type="text" id="guess" autocomplete="off" autofocus/>
  		<input type="submit" value="make guess!"/>
	</form>

	<div id="error" style="background-color: pink; margin-top:2px; margin-bottom: 2px; display: none"></div>
	<div id="history"></div>

	<!--textarea style="margin-top:2vh; width:20vw; height:10vh"></textarea-->

	<hr style="margin-top: 2vh";>
	<h4>Scratchpad:</h4>
	<div id="scratchpad" style="margin-top: 1vh; width: 40vw;"></div>
	<script>resetScratchpad();</script>
	</div>
</body>
</html>
